<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的书签 - 个人起始页</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f8;
    --bg-blur: rgba(255,255,255,0.7);
    --bg-card: rgba(255,255,255,0.75);
    --bg-card-hover: rgba(255,255,255,0.95);
    --text: #1a1a2e;
    --text-secondary: rgba(255,255,255,0.75);
    --text-muted: rgba(255,255,255,0.55);
    --border: rgba(0,0,0,0.07);
    --border-hover: rgba(0,0,0,0.14);
    --primary: #7c6ff7;
    --primary-light: #9d92fa;
    --danger: #f43f5e;
    --radius: 24px;
    --radius-sm: 14px;
    --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 700;
    background: #f0f4f8;
    color: #1a1a2e;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ====== Default Background: Soft Dark Gradient ====== */
  .bg-layer {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse at 50% 0%, #8d7d80 0%, #6c5b65 35%, #4e3d47 70%, #392b34 100%);
  }
  .bg-layer::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: transparent;
  }
  .bg-orb {
    position: absolute; border-radius: 50%;
    filter: blur(120px); opacity: 0.08;
    animation: orbFloat 20s ease-in-out infinite;
  }
  .bg-orb:nth-child(1) { width: 600px; height: 600px; background: #c4a5ac; top: -15%; left: -10%; animation-delay: 0s; opacity: 0.15; }
  .bg-orb:nth-child(2) { width: 500px; height: 500px; background: #a08a9a; top: 50%; right: -12%; animation-delay: -7s; opacity: 0.15; }
  .bg-orb:nth-child(3) { width: 450px; height: 450px; background: #8a6b7b; bottom: -10%; left: 30%; animation-delay: -14s; opacity: 0.15; }
  @keyframes orbFloat {
    0%,100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(3%, -2%) scale(1.05); }
    66% { transform: translate(-2%, 2%) scale(0.95); }
  }
  .bg-grid { display: none; }

  /* ====== Custom Wallpaper ====== */
  .bg-wallpaper {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1;
    background-size: cover; background-position: center; background-repeat: no-repeat;
    pointer-events: none; display: none;
  }
  .bg-wallpaper.active { display: block; }
  .bg-wallpaper.active ~ .bg-layer .bg-orb { opacity: 0.08; }
  .bg-wallpaper.active ~ .bg-layer .bg-grid { opacity: 0.5; }
  .wallpaper-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(240,244,248,0.35); z-index: 2;
    pointer-events: none; display: none;
  }
  .bg-wallpaper.active ~ .wallpaper-overlay { display: block; }

  /* Wallpaper picker popup */
  .wallpaper-popup {
    position: absolute; top: calc(100% + 8px); right: 0;
    background: rgba(255,255,255,0.95); border: 1px solid rgba(0,0,0,0.08);
    border-radius: 16px; padding: 8px; min-width: 200px;
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    z-index: 50; display: none;
    animation: fadeIn 0.15s ease;
  }
  .wallpaper-popup.show { display: block; }
  .wallpaper-item {
    padding: 10px 16px; border-radius: 10px; cursor: pointer;
    font-size: 13px; color: rgba(0,0,0,0.7); transition: all 0.15s;
    display: flex; align-items: center; gap: 10px; font-weight: 500;
  }
  .wallpaper-item:hover { background: rgba(0,0,0,0.04); color: #1a1a2e; }
  .wallpaper-item.danger:hover { background: rgba(244,63,94,0.15); color: #f43f5e; }
  .wallpaper-url-input {
    padding: 8px 12px; margin: 4px 6px 6px;
    border: 1px solid rgba(0,0,0,0.1); border-radius: 10px;
    background: rgba(0,0,0,0.02); color: #1a1a2e; font-size: 13px;
    outline: none; width: calc(100% - 12px); font-family: inherit;
    transition: border var(--transition);
    display: none;
  }
  .wallpaper-url-input.show { display: block; }
  .wallpaper-url-input:focus { border-color: rgba(102,126,234,0.4); }
  .toolbar-right-wrap { position: relative; display: flex; gap: 8px; align-items: center; }

  /* Bookmarklet popup */
  .bmlet-popup {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4); z-index: 1000;
    display: none; align-items: center; justify-content: center;
  }
  .bmlet-popup.show { display: flex; }
  .bmlet-card {
    background: rgba(255,255,255,0.95); border: 1px solid rgba(0,0,0,0.08);
    border-radius: 20px; padding: 32px; max-width: 480px; width: 90%;
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 12px 50px rgba(0,0,0,0.15);
  }
  .bmlet-card h3 { font-size: 20px; font-weight: 600; color: #1a1a2e; margin: 0 0 8px; }
  .bmlet-card .bmlet-sub { font-size: 13px; color: rgba(0,0,0,0.45); margin-bottom: 20px; line-height: 1.6; }
  .bmlet-card .bmlet-link {
    display: block; padding: 14px 20px; border-radius: 14px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff; font-size: 14px; font-weight: 600; text-align: center;
    text-decoration: none; cursor: grab; user-select: none;
    margin-bottom: 16px; transition: transform 0.15s;
  }
  .bmlet-card .bmlet-link:hover { transform: translateY(-2px); }
  .bmlet-card .bmlet-link:active { cursor: grabbing; }
  .bmlet-card .bmlet-tip { font-size: 12px; color: rgba(0,0,0,0.35); text-align: center; line-height: 1.6; }
  .bmlet-card .bmlet-close { margin-top: 20px; width: 100%; padding: 10px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: transparent; color: rgba(0,0,0,0.5); font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.15s; }
  .bmlet-card .bmlet-close:hover { background: rgba(0,0,0,0.03); color: #1a1a2e; }

  .container { flex: 1; min-width: 0; padding: 60px 28px 80px; overflow-y: auto; position: relative; z-index: 1; }

  /* ====== Layout Wrapper & Sidebar ====== */
  .layout-wrapper { display: flex; width: 100%; min-height: 100vh; position: relative; z-index: 1; }
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: rgba(0,0,0,0.18);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-right: 1px solid rgba(255,255,255,0.08);
    padding: 24px 12px 20px;
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .sidebar-header {
    font-size: 16px; font-weight: 700; color: #fff;
    padding: 0 8px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .sidebar-home-btn {
    width: 100%; padding: 9px 14px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.55); font-size: 13px; cursor: pointer;
    transition: all var(--transition);
    display: flex; align-items: center; gap: 8px;
    font-family: inherit; font-weight: 500; text-align: left;
    margin-bottom: 4px;
  }
  .sidebar-home-btn:hover {
    background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.9);
  }
  .sidebar-footer {
    margin-top: auto; padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  /* ====== Group Tabs (Sidebar Vertical) ====== */
  .group-tabs { display: flex; flex-direction: column; gap: 2px; margin-bottom: 0; }
  .group-tab {
    width: 100%; padding: 10px 14px; border-radius: 12px;
    border: 1px solid transparent; background: transparent;
    color: rgba(255,255,255,0.55); font-size: 13px; cursor: pointer;
    transition: all var(--transition);
    display: flex; align-items: center; gap: 8px;
    font-weight: 500; text-align: left; backdrop-filter: none;
    white-space: nowrap;
  }
  .group-tab:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.9); }
  .group-tab.active { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.2); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .group-tab .tab-icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
  .group-tab .tab-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .group-tab .tab-count { font-size: 11px; opacity: 0.5; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 10px; color: rgba(255,255,255,0.7); flex-shrink: 0; font-weight: 400; }
  .group-tab.active .tab-count { opacity: 0.8; background: rgba(255,255,255,0.2); }
  .group-tab .tab-arrow { font-size: 12px; color: rgba(255,255,255,0.25); flex-shrink: 0; margin-left: 4px; }
  .group-tab.dragging { opacity: 0.4; }
  .group-tab.drag-over { background: rgba(255,255,255,0.12); border: 1px dashed rgba(255,255,255,0.3); }
  .add-group-btn {
    width: 100%; height: 40px; border-radius: 12px;
    border: 1px dashed rgba(255,255,255,0.2); background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.5); cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all var(--transition); font-family: inherit; font-weight: 500;
  }
  .add-group-btn:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.1); }
  /* Manage mode */
  .sidebar-manage-bar { display: flex; gap: 6px; }
  .sidebar-manage-bar .add-group-btn { flex: 1; }
  .manage-toggle-btn {
    height: 40px; padding: 0 12px; border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.6); cursor: pointer; font-size: 12px;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    transition: all var(--transition); font-family: inherit; font-weight: 500;
    white-space: nowrap;
  }
  .manage-toggle-btn:hover { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); }
  .manage-toggle-btn.active { background: rgba(244,63,94,0.3); border-color: rgba(244,63,94,0.5); color: #fca5a5; }
  .group-tab .tab-checkbox {
    width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.3); background: transparent;
    display: none; align-items: center; justify-content: center;
    font-size: 11px; color: #fff; transition: all 0.15s;
  }
  .group-tab.manage-mode .tab-checkbox { display: flex; }
  .group-tab.manage-mode.checked .tab-checkbox { background: #f43f5e; border-color: #f43f5e; }
  .group-tab.manage-mode { cursor: default; }
  .batch-delete-bar {
    display: none; padding: 8px 0; border-top: 1px solid rgba(255,255,255,0.08);
    margin-top: 8px;
  }
  .batch-delete-bar.show { display: block; }
  .batch-delete-btn {
    width: 100%; height: 38px; border-radius: 10px;
    border: none; background: rgba(244,63,94,0.25);
    color: #fca5a5; cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all var(--transition); font-family: inherit; font-weight: 600;
  }
  .batch-delete-btn:hover { background: rgba(244,63,94,0.4); color: #fecaca; }
  .batch-delete-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  /* Long-press group menu */
  .group-menu {
    position: fixed; z-index: 1000;
    background: rgba(255,255,255,0.95); border: 1px solid rgba(0,0,0,0.1);
    border-radius: 14px; padding: 6px; min-width: 100px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    display: none; flex-direction: column; gap: 2px;
  }
  .group-menu-item {
    padding: 10px 16px; border: none; border-radius: 10px;
    background: transparent; font-size: 14px; cursor: pointer;
    text-align: left; color: #1a1a2e; transition: background 0.15s;
    display: flex; align-items: center; gap: 8px; white-space: nowrap;
  }
  .group-menu-item:hover { background: rgba(0,0,0,0.06); }
  .group-menu-item.danger { color: #f43f5e; }
  .group-menu-item.danger:hover { background: rgba(244,63,94,0.08); }
  .header { text-align: center; margin-bottom: 40px; }
  .clock-row { display: flex; align-items: center; justify-content: center; gap: 16px; }
  .clock {
    font-size: 88px; font-weight: 200; letter-spacing: 4px; color: #fff; line-height: 1;
    text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    font-variant-numeric: tabular-nums;
  }
  .weather-widget {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 20px;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    font-size: 14px; color: rgba(255,255,255,0.8);
    backdrop-filter: blur(16px) saturate(150%); -webkit-backdrop-filter: blur(16px) saturate(150%);
    cursor: default; vertical-align: middle; margin-left: 8px;
  }
  .weather-widget .weather-icon { font-size: 20px; }
  .date-text { font-size: 15px; color: var(--text-secondary); margin-top: 12px; letter-spacing: 0.5px; text-shadow: 0 1px 8px rgba(0,0,0,0.2); }
  .greeting { font-size: 18px; font-weight: 400; margin-top: 4px; color: var(--text-muted); text-shadow: 0 1px 8px rgba(0,0,0,0.2); }

  /* ====== Search ====== */
  .search-section { margin-bottom: 20px; display: flex; justify-content: center; }
  .search-wrapper { position: relative; width: 100%; max-width: 680px; }
  .search-box {
    width: 100%; height: 60px; padding: 0 120px 0 24px;
    border: 1px solid rgba(255,255,255,0.25); border-radius: 20px;
    font-size: 17px; background: rgba(255,255,255,0.12); color: #fff;
    outline: none; transition: all var(--transition);
    backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
    box-shadow: 0 4px 30px rgba(0,0,0,0.08);
    letter-spacing: 0.3px;
  }
  .search-box::placeholder { color: rgba(255,255,255,0.5); }
  .search-box:focus {
    border-color: rgba(102,126,234,0.5);
    background: rgba(255,255,255,0.95);
    box-shadow: 0 0 0 4px rgba(102,126,234,0.1), 0 8px 30px rgba(0,0,0,0.08);
  }
  .search-engines {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    display: flex; gap: 4px;
  }
  .search-engine-dot {
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.06);
    cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: all var(--transition); color: rgba(0,0,0,0.45);
  }
  .search-engine-dot:hover { background: rgba(0,0,0,0.08); color: #1a1a2e; border-color: rgba(0,0,0,0.15); }
  .search-engine-dot.active { background: rgba(102,126,234,0.15); color: #667eea; border-color: rgba(102,126,234,0.35); box-shadow: 0 0 12px rgba(102,126,234,0.1); }

  /* ====== Toolbar ====== */
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .toolbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    padding: 9px 18px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.06);
    background: rgba(255,255,255,0.7); color: rgba(0,0,0,0.65); font-size: 13px;
    cursor: pointer; transition: all var(--transition);
    display: inline-flex; align-items: center; gap: 5px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    font-family: inherit; font-weight: 500; white-space: nowrap;
  }
  .btn:hover { background: rgba(255,255,255,0.95); border-color: rgba(0,0,0,0.14); color: #1a1a2e; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .btn-primary { background: rgba(102,126,234,0.12); color: #667eea; border-color: rgba(102,126,234,0.25); font-weight: 600; }
  .btn-primary:hover { background: rgba(102,126,234,0.2); border-color: rgba(102,126,234,0.4); box-shadow: 0 4px 20px rgba(102,126,234,0.15); color: #667eea; }
  .toolbar-right { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.7); cursor: pointer; font-size: 16px;
    width: 38px; height: 38px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
    backdrop-filter: blur(16px) saturate(150%); -webkit-backdrop-filter: blur(16px) saturate(150%);
  }
  .icon-btn:hover { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.4); color: #fff; transform: translateY(-1px); }
  .icon-btn.danger:hover { color: #ff6b6b; border-color: rgba(255,107,107,0.4); background: rgba(255,107,107,0.12); }

  /* ====== Hot Trends & AI Tools ====== */
  .hot-trends-section { margin-bottom: 20px; }
  .hot-trends-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .hot-trends-header h2 { font-size: 16px; color: #fff; font-weight: 700; }
  .hot-trends-header span { font-size: 11px; color: rgba(255,255,255,0.4); }
  .hot-trends-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  .hot-trend-card {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 16px 14px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    transition: all 0.3s ease;
  }
  .hot-trend-card:hover { background: rgba(255,255,255,0.22); transform: translateY(-2px); }
  .hot-trend-card .card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 14px; font-weight: 700; color: #fff; }
  .hot-trend-card .card-header .icon { font-size: 18px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
  .hot-trend-card .card-header .tag { font-size: 10px; color: rgba(255,255,255,0.45); margin-left: auto; font-weight: 500; }
  .hot-trend-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 12px; color: rgba(255,255,255,0.8); cursor: pointer; transition: all 0.15s; border-radius: 6px; }
  .hot-trend-item:hover { color: #fff; background: rgba(255,255,255,0.08); padding-left: 4px; padding-right: 4px; margin: 0 -4px; }
  .hot-trend-item .rank { width: 18px; height: 18px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .hot-trend-item .rank.top1 { background: #ff4757; color: #fff; }
  .hot-trend-item .rank.top2 { background: #ff6b81; color: #fff; }
  .hot-trend-item .rank.top3 { background: #ffa502; color: #fff; }
  .hot-trend-item .rank.normal { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); }
  .hot-trend-item .title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hot-trend-item .heat { font-size: 10px; color: rgba(255,255,255,0.35); flex-shrink: 0; font-weight: 400; }
  .hot-trend-loading { text-align: center; padding: 20px; color: rgba(255,255,255,0.4); font-size: 13px; }
  .hot-trend-error { text-align: center; padding: 12px; color: rgba(255,255,255,0.4); font-size: 12px; }
  .hot-trend-error a { color: rgba(255,255,255,0.6); text-decoration: underline; }

  /* AI Tools Section */
  .ai-tools-section { margin-bottom: 24px; }
  .ai-tools-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .ai-tools-header h2 { font-size: 16px; color: #fff; font-weight: 700; }
  .ai-tools-header span { font-size: 11px; color: rgba(255,255,255,0.4); }
  .ai-tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 14px;
  }
  .ai-tool-card {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 14px 12px;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);

  .url-row { display: flex; gap: 8px; }

<script>
// === State ===
const DEFAULT_GROUPS = [
  { id: 'g1', name: '开发工具', color: '#7c6ff7' },
  { id: 'g2', name: '社交媒体', color: '#f5576c' },
  { id: 'g3', name: '学习资源', color: '#10b981' },
  { id: 'g4', name: '常用工具', color: '#3b82f6' },
];
const DEFAULT_BOOKMARKS = [
  { id: '1', title: 'GitHub', url: 'https://github.com', color: 'gradient8', groupId: 'g1' },
  { id: '2', title: '谷歌', url: 'https://www.google.com', color: 'gradient3', groupId: 'g4' },
  { id: '3', title: '百度', url: 'https://www.baidu.com', color: 'gradient4', groupId: 'g4' },
  { id: '4', title: 'B站', url: 'https://www.bilibili.com', color: 'gradient2', groupId: 'g2' },
  { id: '5', title: '知乎', url: 'https://www.zhihu.com', color: 'gradient3', groupId: 'g2' },
  { id: '6', title: '掘金', url: 'https://juejin.cn', color: 'gradient1', groupId: 'g1' },
  { id: '7', title: '微信公众平台', url: 'https://mp.weixin.qq.com', color: 'gradient6', groupId: 'g4' },
  { id: '8', title: 'YouTube', url: 'https://www.youtube.com', color: 'gradient2', groupId: 'g3' },
  { id: '9', title: 'Stack Overflow', url: 'https://stackoverflow.com', color: 'gradient5', groupId: 'g1' },
  { id: '10', title: '语雀', url: 'https://www.yuque.com', color: 'gradient6', groupId: 'g3' },
  { id: '11', title: '飞书', url: 'https://www.feishu.cn', color: 'gradient3', groupId: 'g4' },
  { id: '12', title: 'V2EX', url: 'https://www.v2ex.com', color: 'gradient8', groupId: 'g2' },
];

let bookmarks = [], groups = [];
let editingId = null, editingGroupId = null;
let currentEngine = 'google', filterQuery = '';
let selectedColor = 'gradient1', selectedGroup = null;
let useApi = false, authToken = null, needAuth = false;
let contextTargetId = null;
let multiSelectMode = false, selectedGroupIds = new Set();

function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

// === Auth ===
function getAuthHeaders() {
  const headers = { 'Content-Type': 'application/json' };
  if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
  return headers;
}
async function apiCall(url, options = {}) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 5000);
  try {
    const res = await fetch(url, { headers: getAuthHeaders(), signal: controller.signal, ...options });
    clearTimeout(timeout);
    if (res.status === 401) { clearAuth(); showLogin(); throw new Error('登录已过期'); }
    const data = await res.json();
    if (!data.success && !res.ok) throw new Error(data.error || '请求失败');
    return data;
  } catch (e) { clearTimeout(timeout); if (e.name === 'AbortError') throw new Error('请求超时'); throw e; }
}
async function apiAuthFetch(url, options = {}) {
  const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...options });
  return res.json();
}

const API = '/api/bookmarks', API_GROUPS = '/api/groups', API_AUTH = '/api/auth';
const LS_KEY = 'wb_bookmarks', LS_KEY_GROUPS = 'wb_groups', LS_TOKEN = 'wb_token';

// === Login ===
function showLogin() { document.getElementById('loginOverlay').classList.remove('hidden'); document.getElementById('loginPassword').value = ''; document.getElementById('loginError').textContent = ''; document.getElementById('mainContent').classList.add('hidden'); setTimeout(() => document.getElementById('loginPassword').focus(), 150); }
function hideLogin() { document.getElementById('loginOverlay').classList.add('hidden'); document.getElementById('mainContent').classList.remove('hidden'); }

async function doLogin() {
  const password = document.getElementById('loginPassword').value.trim();
  if (!password) { document.getElementById('loginError').textContent = '请输入密码'; return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '验证中...';
  document.getElementById('loginError').textContent = '';
  try {
    const result = await apiAuthFetch(`${API_AUTH}/login`, { method: 'POST', body: JSON.stringify({ password }) });
    if (result.success) { authToken = result.token; localStorage.setItem(LS_TOKEN, authToken); hideLogin(); await loadBookmarks(); checkAutoAdd(); fetchHotBoards(); showToast('已解锁'); }
    else { document.getElementById('loginError').textContent = result.error || '密码错误'; }
  } catch (e) { document.getElementById('loginError').textContent = '网络错误，请重试'; }
  finally { btn.disabled = false; btn.textContent = '解锁'; }
}

function clearAuth() { authToken = null; localStorage.removeItem(LS_TOKEN); }
async function doLogout() {
  try { await apiAuthFetch(`${API_AUTH}/logout`, { method: 'POST', headers: getAuthHeaders() }); } catch (e) {}
  clearAuth(); showLogin(); showToast('已锁定');
}

// === Storage ===
async function checkApiAvailable() {
  try {
    const statusRes = await apiAuthFetch(`${API_AUTH}/status`);
    needAuth = statusRes.needAuth === true;
    if (needAuth) {
      const stored = localStorage.getItem(LS_TOKEN);
      if (stored) { authToken = stored; try { await apiCall(API); useApi = true; return; } catch (e) { clearAuth(); } }
      useApi = true; return;
    }
    try { const r = await fetch(API, { signal: AbortSignal.timeout(2000) }); const d = await r.json(); useApi = d.success === true; } catch { useApi = false; }
  } catch { useApi = false; needAuth = false; }
}

async function loadBookmarks() {
  if (useApi) { try { const result = await apiCall(API); bookmarks = result.data; groups = result.groups || []; } catch (e) { if (e.message.includes('登录已过期')) throw e; fallbackLocal(); } }
  else { fallbackLocal(); }
  renderAll();
}
function fallbackLocal() {
  useApi = false;
  const raw = localStorage.getItem(LS_KEY); bookmarks = raw ? (() => { try { return JSON.parse(raw); } catch { return []; } })() : [];
  if (bookmarks.length === 0) bookmarks = DEFAULT_BOOKMARKS.map(b => ({...b}));
  const rawG = localStorage.getItem(LS_KEY_GROUPS); groups = rawG ? (() => { try { return JSON.parse(rawG); } catch { return []; } })() : [];
  if (groups.length === 0) groups = [...DEFAULT_GROUPS];
  localSaveAll();
}
function localSaveAll() { localStorage.setItem(LS_KEY, JSON.stringify(bookmarks)); localStorage.setItem(LS_KEY_GROUPS, JSON.stringify(groups)); }

// === Group CRUD ===
async function saveAddGroup(name, color) {
  if (useApi) { const r = await apiCall(API_GROUPS, { method: 'POST', body: JSON.stringify({ name, color }) }); groups.push(r.data); return r; }
  const g = { id: generateId(), name, color }; groups.push(g); localSaveAll(); return { data: g };
}
async function saveUpdateGroup(id, name, color) {
  if (useApi) await apiCall(`${API_GROUPS}/${id}`, { method: 'PUT', body: JSON.stringify({ name, color }) });
  const idx = groups.findIndex(g => g.id === id);
  if (idx !== -1) { if (name !== undefined) groups[idx].name = name; if (color !== undefined) groups[idx].color = color; }
  localSaveAll();
}
async function saveDeleteGroup(id) {
  if (useApi) await apiCall(`${API_GROUPS}/${id}`, { method: 'DELETE' });
  groups = groups.filter(g => g.id !== id);
  bookmarks.forEach(bm => { if (bm.groupId === id) bm.groupId = ''; });
  if (selectedGroup === id) selectedGroup = null;
  localSaveAll();
}
function getGroupById(id) { return groups.find(g => g.id === id); }

// === Bookmark CRUD ===
async function saveAddBookmark(title, url, color, icon, groupId) {
  if (useApi) { const r = await apiCall(API, { method: 'POST', body: JSON.stringify({ title, url, color, icon, groupId }) }); bookmarks.push(r.data); return r; }
  const bm = { id: generateId(), title, url, color: color || 'gradient1', icon: icon || '', groupId: groupId || '' }; bookmarks.push(bm); localSaveAll(); return { data: bm };
}
async function saveUpdateBookmark(id, title, url, color, icon, groupId) {
  if (useApi) { const r = await apiCall(`${API}/${id}`, { method: 'PUT', body: JSON.stringify({ title, url, color, icon, groupId }) }); const idx = bookmarks.findIndex(b => b.id === id); if (idx !== -1) bookmarks[idx] = r.data; return r; }
  const idx = bookmarks.findIndex(b => b.id === id);
  if (idx !== -1) { bookmarks[idx] = { ...bookmarks[idx], title, url, color, icon, groupId }; localSaveAll(); }
  return { data: bookmarks[idx] };
}
async function saveDeleteBookmark(id) { if (useApi) await apiCall(`${API}/${id}`, { method: 'DELETE' }); bookmarks = bookmarks.filter(b => b.id !== id); localSaveAll(); }


// === Render ===
function renderAll() { renderGroupTabs(); renderAITools(); renderBookmarks(); }
function getIconHtml(bm) {
  if (bm.icon && bm.icon.startsWith('http')) return `<img src="${bm.icon}" alt="" draggable="false" onerror="this.style.display='none';this.parentElement.textContent='${bm.title.charAt(0).toUpperCase()}';" crossorigin="anonymous">`;
  return bm.title.charAt(0).toUpperCase();
}
function getColorStyle(color) {
  const gradients = {
    gradient1: 'linear-gradient(135deg, #667eea, #764ba2)', gradient2: 'linear-gradient(135deg, #f093fb, #f5576c)',
    gradient3: 'linear-gradient(135deg, #4facfe, #00f2fe)', gradient4: 'linear-gradient(135deg, #43e97b, #38f9d7)',
    gradient5: 'linear-gradient(135deg, #fa709a, #fee140)', gradient6: 'linear-gradient(135deg, #a18cd1, #fbc2eb)',
    gradient7: 'linear-gradient(135deg, #ffecd2, #fcb69f)', gradient8: 'linear-gradient(135deg, #667eea, #667eea)',
  };
  return gradients[color] || gradients.gradient8;
}

function renderGroupTabs() {
  const container = document.getElementById('groupTabs');
  let html = '';
  groups.forEach(g => {
    const count = bookmarks.filter(b => b.groupId === g.id).length;
    const active = selectedGroup === g.id;
    const checked = selectedGroupIds.has(g.id);
    const mc = multiSelectMode ? ' manage-mode' + (checked ? ' checked' : '') : '';
    html += `<button class="group-tab ${active && !multiSelectMode ? 'active' : ''}${mc}" data-group="${g.id}" ${multiSelectMode ? '' : 'draggable="true"'}>
      <span class="tab-checkbox">${checked ? '✓' : ''}</span>
      <span class="tab-icon">${escapeHtml(g.icon || '📁')}</span>
      <span class="tab-name">${escapeHtml(g.name)}</span>
      <span class="tab-count">${count}</span>
    </button>`;
  });
  container.innerHTML = html;
  // Group tab click: short click = filter, long press = edit/delete, drag = reorder
  // In manage mode: click = toggle checkbox, long press still works
  let longPressTimer = null;
  let longPressTriggered = false;
  let groupDragSrcId = null;
  container.querySelectorAll('.group-tab').forEach(tab => {
    const groupId = tab.dataset.group;
    const onStart = (e) => {
      longPressTriggered = false;
      longPressTimer = setTimeout(() => {
        longPressTriggered = true;
        if (!multiSelectMode) showGroupMenu(e, groupId);
      }, 600);
    };
    const onEnd = () => {
      clearTimeout(longPressTimer);
      if (longPressTriggered) return;
      if (multiSelectMode) {
        // Toggle checkbox in manage mode
        if (selectedGroupIds.has(groupId)) {
          selectedGroupIds.delete(groupId);
        } else {
          selectedGroupIds.add(groupId);
        }
        updateBatchDeleteBar();
        renderGroupTabs();
      } else {
        selectedGroup = (selectedGroup === groupId) ? null : groupId;
        renderAll();
      }
    };
    tab.addEventListener('mousedown', onStart);
    tab.addEventListener('mouseup', onEnd);
    tab.addEventListener('mouseleave', () => clearTimeout(longPressTimer));
    tab.addEventListener('touchstart', onStart, { passive: true });
    tab.addEventListener('touchend', onEnd);
    tab.addEventListener('touchmove', () => { clearTimeout(longPressTimer); longPressTriggered = true; });
    if (multiSelectMode) return; // No drag in manage mode
    // Drag events
    tab.addEventListener('dragstart', (e) => {
      clearTimeout(longPressTimer);
      longPressTriggered = true;
      groupDragSrcId = groupId;
      tab.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    tab.addEventListener('dragend', () => {
      tab.classList.remove('dragging');
      document.querySelectorAll('.group-tab').forEach(t => t.classList.remove('drag-over'));
    });
    tab.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (tab.dataset.group !== groupDragSrcId) tab.classList.add('drag-over');
    });
    tab.addEventListener('dragenter', (e) => { e.preventDefault(); });
    tab.addEventListener('dragleave', () => tab.classList.remove('drag-over'));
    tab.addEventListener('drop', (e) => {
      e.preventDefault();
      tab.classList.remove('drag-over');
      const targetId = tab.dataset.group;
      if (!groupDragSrcId || groupDragSrcId === targetId) return;
      const srcIdx = groups.findIndex(g => g.id === groupDragSrcId);
      const tgtIdx = groups.findIndex(g => g.id === targetId);
      if (srcIdx === -1 || tgtIdx === -1) return;
      const [moved] = groups.splice(srcIdx, 1);
      groups.splice(tgtIdx, 0, moved);
      groupDragSrcId = null;
      saveGroupReorder();
      renderAll();
    });
  });
  if (!document.getElementById('addGroupBtn')._bound) {
    document.getElementById('addGroupBtn')._bound = true;
    document.getElementById('addGroupBtn').addEventListener('click', () => openGroupModal('新建分组', null));
  }
}

function toggleManageMode() {
  multiSelectMode = !multiSelectMode;
  const btn = document.getElementById('manageToggleBtn');
  if (multiSelectMode) {
    btn.textContent = '✕ 取消';
    btn.classList.add('active');
    selectedGroupIds.clear();
    selectedGroup = null;
  } else {
    btn.textContent = '✎ 管理';
    btn.classList.remove('active');
    selectedGroupIds.clear();
  }
  updateBatchDeleteBar();
  renderGroupTabs();
  // If exiting manage mode without a selected group, show home
  if (!multiSelectMode && !selectedGroup && !filterQuery) renderBookmarks();
}

function updateBatchDeleteBar() {
  const bar = document.getElementById('batchDeleteBar');
  const count = document.getElementById('batchCount');
  count.textContent = selectedGroupIds.size;
  if (multiSelectMode && selectedGroupIds.size > 0) {
    bar.classList.add('show');
  } else {
    bar.classList.remove('show');
  }
}

async function batchDeleteGroups() {
  if (selectedGroupIds.size === 0) return;
  const names = groups.filter(g => selectedGroupIds.has(g.id)).map(g => g.name).join('、');
  if (!confirm(`确定删除以下 ${selectedGroupIds.size} 个分组吗？\n\n${names}\n\n书签不会被删除，只会移出分组。`)) return;
  try {
    const ids = Array.from(selectedGroupIds);
    if (useApi) {
      await apiCall(`${API_GROUPS}/batch-delete`, { method: 'POST', body: JSON.stringify({ ids }) });
    }
    groups = groups.filter(g => !selectedGroupIds.has(g.id));
    bookmarks.forEach(bm => { if (selectedGroupIds.has(bm.groupId)) bm.groupId = ''; });
    if (selectedGroupIds.has(selectedGroup)) selectedGroup = null;
    selectedGroupIds.clear();
    localSaveAll();
    updateBatchDeleteBar();
    renderGroupTabs();
    if (!selectedGroup && !filterQuery) renderBookmarks();
    showToast(`已删除 ${ids.length} 个分组`);
  } catch (e) {
    showToast('批量删除失败: ' + e.message);
  }
}

// Bind manage & batch-delete buttons (once)
(function bindSidebarButtons() {
  document.getElementById('manageToggleBtn').addEventListener('click', toggleManageMode);
  document.getElementById('batchDeleteBtn').addEventListener('click', batchDeleteGroups);
})();

function renderBookmarks() {
  const grid = document.getElementById('bookmarkGrid');
  const empty = document.getElementById('emptyState');
  const countEl = document.getElementById('bookmarkCount');
  const hotSection = document.getElementById('hotTrendsSection');
  const aiSection = document.getElementById('aiToolsSection');

  // Toggle hot trends & AI tools visibility based on selection state
  if (!selectedGroup && !filterQuery) {
    hotSection.style.display = 'block';
    aiSection.style.display = 'block';
    grid.innerHTML = ''; empty.style.display = 'none';
    countEl.textContent = '热搜 · AI工具';
    return;
  } else {
    hotSection.style.display = 'none';
    aiSection.style.display = 'none';
  }

  // Default: no group selected = show nothing unless searching
  let filtered;
  if (filterQuery) {
    // Search globally across all bookmarks regardless of group selection
    const q = filterQuery.toLowerCase();
    filtered = bookmarks.filter(b => b.title.toLowerCase().includes(q) || b.url.toLowerCase().includes(q));
  } else if (selectedGroup) {
    filtered = bookmarks.filter(b => b.groupId === selectedGroup);
  } else {
    filtered = []; // No group, no search = empty
  }
  const total = bookmarks.length;
  if (filterQuery) { countEl.textContent = `搜索: ${filtered.length} / ${total} 个书签${useApi ? '' : ' (本地)'}`; }
  else if (selectedGroup) { countEl.textContent = `${filtered.length} / ${total} 个书签${useApi ? '' : ' (本地)'}`; }
  else { countEl.textContent = '请选择分组'; }

  if (filtered.length === 0) {
    grid.innerHTML = ''; empty.style.display = 'block';
    if (filterQuery) { empty.querySelector('h2').textContent = '未找到匹配的书签'; empty.querySelector('p').textContent = '试试其他关键词'; }
    else if (selectedGroup) { empty.querySelector('h2').textContent = '该分组暂无书签'; empty.querySelector('p').textContent = '点击「+ 添加书签」并选择此分组'; }
    else { empty.querySelector('h2').textContent = '请选择一个分组'; empty.querySelector('p').textContent = '点击上方分组标签查看对应书签'; }
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = filtered.map(bm => {
    const group = getGroupById(bm.groupId);
    const groupTag = group ? `<span class="card-group-tag" style="background:${group.color}44;color:${group.color}">${escapeHtml(group.name)}</span>` : '';
    return `<div class="bookmark-card" data-id="${bm.id}" draggable="true" onclick="openBookmark(event,'${bm.id}')" oncontextmenu="showContextMenu(event,'${bm.id}')">
      <div class="card-icon" style="background:${getColorStyle(bm.color)};">${getIconHtml(bm)}</div>
      <span class="card-title">${escapeHtml(bm.title)}</span>${groupTag}
      <div class="card-actions">
        <button class="card-action edit" onclick="event.stopPropagation();editBookmark('${bm.id}')" title="编辑">&#9998;</button>
        <button class="card-action del" onclick="event.stopPropagation();deleteBookmark('${bm.id}')" title="删除">&#10005;</button>
      </div>
    </div>`;
  }).join('');
  bindDragEvents();
}

// === Hot Trends & AI Tools ===
let hotBoardsData = { weibo: null, douyin: null, xiaohongshu: null, bilibili: null };
const HOT_API_BASE = 'https://uapis.cn/api/v1/misc/hotboard';
const HOT_SOURCES = [
  { key: 'weibo', name: '微博', icon: '🔥', tag: '热搜榜', color: '#e6162d' },
  { key: 'douyin', name: '抖音', icon: '🎵', tag: '今日热门', color: '#1a1a2e' },
  { key: 'xiaohongshu', name: '小红书', icon: '📕', tag: '社区精选', color: '#ff2442' },
  { key: 'bilibili', name: '哔哩哔哩', icon: '📺', tag: '综合热门', color: '#00a1d6' }
];

async function fetchHotBoards() {
  const grid = document.getElementById('hotTrendsGrid');
  const timeEl = document.getElementById('hotTrendsUpdateTime');
  if (!grid) return;
  grid.innerHTML = '<div class="hot-trend-loading" style="grid-column: 1 / -1;">正在获取热榜数据...</div>';
  timeEl.textContent = '更新中...';

  const results = await Promise.allSettled(HOT_SOURCES.map(async s => {
    try {
      const res = await fetch(`${HOT_API_BASE}?type=${s.key}`);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      return { key: s.key, data: data };
    } catch (e) { return { key: s.key, error: e.message }; }
  }));

  results.forEach(r => {
    if (r.status === 'fulfilled') {
      if (r.value.data) hotBoardsData[r.value.key] = r.value.data;
    }
  });
  renderHotBoards();

  const anyOk = results.some(r => r.status === 'fulfilled' && !r.value.error);
  if (anyOk) {
    const now = new Date();
    timeEl.textContent = `更新于 ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  } else {
    timeEl.textContent = '获取失败';
  }
}

function renderHotBoards() {
  const grid = document.getElementById('hotTrendsGrid');
  if (!grid) return;
  let html = '';
  HOT_SOURCES.forEach(s => {
    const data = hotBoardsData[s.key];
    if (!data || !data.list || !data.list.length) {
      html += `<div class="hot-trend-card"><div class="card-header"><span class="icon" style="background:${s.color}22;color:${s.color};">${s.icon}</span>${s.name}<span class="tag">${s.tag}</span></div><div class="hot-trend-error">暂无数据</div></div>`;
      return;
    }
    const items = data.list.slice(0, 6);
    let itemsHtml = items.map((item, i) => {
      const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : 'normal';
      const heatVal = item.hot_value ? formatHotValue(item.hot_value) : '';
      return `<div class="hot-trend-item" onclick="window.open('${escapeHtml(item.url)}','_blank')">
        <span class="rank ${rankClass}">${item.index}</span>
        <span class="title" title="${escapeHtml(item.title)}">${escapeHtml(item.title)}</span>
        ${heatVal ? `<span class="heat">${heatVal}</span>` : ''}
      </div>`;
    }).join('');
    html += `<div class="hot-trend-card">
      <div class="card-header"><span class="icon" style="background:${s.color}22;color:${s.color};">${s.icon}</span>${s.name}<span class="tag">${s.tag}</span></div>
      ${itemsHtml}
    </div>`;
  });
  grid.innerHTML = html;
}

function formatHotValue(val) {
  const num = parseInt(val, 10);
  if (isNaN(num)) return '';
  if (num >= 10000) return (num / 10000).toFixed(1) + '万';
  return num.toString();
}

// === Drag & Drop Reorder ===
let dragSrcId = null;
let justDragged = false;
function bindDragEvents() {
  const cards = document.querySelectorAll('.bookmark-card');
  cards.forEach(card => {
    card.addEventListener('dragstart', e => {
      dragSrcId = card.dataset.id;
      justDragged = true;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', card.dataset.id);
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.bookmark-card').forEach(c => c.classList.remove('drag-over'));
      setTimeout(() => { justDragged = false; }, 100);
    });
    card.addEventListener('dragenter', e => {
      e.preventDefault();
      if (card.dataset.id !== dragSrcId) card.classList.add('drag-over');
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (card.dataset.id !== dragSrcId) card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', e => {
      if (e.target === card) card.classList.remove('drag-over');
    });
    card.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      card.classList.remove('drag-over');
      const targetId = card.dataset.id;
      if (!dragSrcId || dragSrcId === targetId) return;
      const srcIdx = bookmarks.findIndex(b => b.id === dragSrcId);
      const tgtIdx = bookmarks.findIndex(b => b.id === targetId);
      if (srcIdx === -1 || tgtIdx === -1) return;
      const [moved] = bookmarks.splice(srcIdx, 1);
      bookmarks.splice(tgtIdx, 0, moved);
      dragSrcId = null;
      saveReorder();
      renderBookmarks();
    });
  });
}
async function saveReorder() {
  if (useApi) {
    try { await apiCall(`${API}/reorder`, { method: 'PUT', body: JSON.stringify({ ids: bookmarks.map(b => b.id) }) }); } catch (e) { console.error('Reorder save failed:', e); }
  } else { localSaveAll(); }
}
async function saveGroupReorder() {
  if (useApi) {
    try { await apiCall(`${API_GROUPS}/reorder`, { method: 'PUT', body: JSON.stringify({ ids: groups.map(g => g.id) }) }); } catch (e) { console.error('Group reorder save failed:', e); }

}

function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

function openModal(title, bm, prefillUrl, prefillTitle) {
  editingId = bm ? bm.id : null;

  document.getElementById('modalTitleInput').value = bm ? bm.title : (prefillTitle || '');

async function addBookmark() {
  const title = document.getElementById('modalTitleInput').value.trim();
  let url = document.getElementById('modalUrlInput').value.trim();
  const icon = document.getElementById('modalIconInput').value.trim();
  const groupId = document.getElementById('modalGroupSelect').value;
  if (!title || !url) { showToast('请填写名称和网址'); return; }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  try {
    if (editingId) { await saveUpdateBookmark(editingId, title, url, selectedColor, icon, groupId); showToast('书签已更新'); }
    else { await saveAddBookmark(title, url, selectedColor, icon, groupId); showToast('书签已添加'); }
    renderAll(); closeModal();
  } catch (e) { showToast('操作失败: ' + e.message); }
}

// === Auto-fetch ===
async function fetchWebsiteMeta() {
  const url = document.getElementById('modalUrlInput').value.trim(); if (!url) return;
  const btn = document.getElementById('fetchMetaBtn'); btn.textContent = '获取中...'; btn.disabled = true; btn.classList.add('fetching');
  try {
    if (useApi) {
      const r = await apiCall(`/api/fetch-meta?url=${encodeURIComponent(url)}`);
      if (r.success) { const ti = document.getElementById('modalTitleInput'); if (!ti.value.trim() && r.title) ti.value = r.title; if (r.icon) { const ii = document.getElementById('modalIconInput'); if (!ii.value.trim()) ii.value = r.icon; } showToast(r.title ? `已获取: ${r.title}` : '未找到标题'); }
    }
  } catch (e) { showToast('获取失败: ' + e.message); }
  finally { btn.textContent = '获取信息'; btn.disabled = false; btn.classList.remove('fetching'); }
}

function editBookmark(id) { const bm = bookmarks.find(b => b.id === id); if (bm) openModal('编辑书签', bm); }

  const now = new Date();
  document.getElementById('clock').textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

// === Export / Import ===
function exportBookmarks() {
  try { const blob = new Blob([JSON.stringify({ bookmarks, groups }, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `bookmarks-backup-${new Date().toISOString().slice(0,10)}.json`; a.click(); showToast('导出成功'); } catch (e) { showToast('导出失败'); }
}
async function importBookmarks(file) {
  try {
    const text = await file.text(); let data = JSON.parse(text);
    if (Array.isArray(data)) data = { bookmarks: data, groups: [] };
    const ig = data.groups || [], ib = data.bookmarks || [];
    if (useApi) {
      const res = await apiCall('/api/import', { method: 'POST', body: JSON.stringify({ groups: ig, bookmarks: ib }) });
      if (!res.success) throw new Error(res.error || '导入失败');
      await loadBookmarks();
      showToast(`成功导入 ${res.data.bookmarksAdded} 个书签、${res.data.groupsAdded} 个分组`);
    } else {
      for (const g of ig) { if (!groups.some(ex => ex.id === g.id)) groups.push(g); }
      for (const bm of ib) { bookmarks.push({ ...bm, id: generateId() }); }
      localSaveAll(); renderAll();
      showToast(`成功导入 ${ib.length} 个书签、${ig.length} 个分组`);
    }
  } catch (e) { showToast('导入失败: ' + e.message); }
}

  if (e.key === 'Enter') {
    const url = e.target.value.trim(); if (!url) return;
    const img = new Image(); img.crossOrigin = 'anonymous';
    img.onload = () => {
      const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
      const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
      setWallpaper(canvas.toDataURL('image/jpeg', 0.85));
      showToast('壁纸已更新');
      toggleWallpaperPopup(); document.getElementById('wpUrlInput').value = ''; document.getElementById('wpUrlInput').classList.remove('show');
    };
    img.onerror = () => { showToast('图片链接无效，请检查后重试'); };

});

    fetchHotBoards();

  await checkApiAvailable();
  if (needAuth) {
    if (authToken) { try { await loadBookmarks(); hideLogin(); checkAutoAdd(); fetchHotBoards(); return; } catch (e) { showLogin(); return; } }
    showLogin(); return;
  }
  document.getElementById('logoutBtn').style.display = 'none';

  checkAutoAdd();

})();

function checkAutoAdd() {
  const params = new URLSearchParams(window.location.search);
  const addUrl = params.get('addUrl');
  const addTitle = params.get('addTitle');
  if (addUrl) {
    openModal('添加书签', null, addUrl, addTitle || '');
    // Trigger auto-fetch meta after modal is open
    setTimeout(() => {
      const ui = document.getElementById('modalUrlInput');
      if (ui && ui.value) fetchWebsiteMeta();
    }, 300);
    // Clean URL
    window.history.replaceState({}, '', window.location.pathname);
  }
}
