<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的书签 - 个人起始页</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f8;
    --bg-blur: rgba(255,255,255,0.7);
    --bg-card: rgba(255,255,255,0.75);
    --bg-card-hover: rgba(255,255,255,0.95);
    --text: #1a1a2e;
    --text-secondary: rgba(255,255,255,0.75);
    --text-muted: rgba(255,255,255,0.55);
    --border: rgba(0,0,0,0.07);
    --border-hover: rgba(0,0,0,0.14);
    --primary: #7c6ff7;
    --primary-light: #9d92fa;
    --danger: #f43f5e;
    --radius: 24px;
    --radius-sm: 14px;
    --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 700;
    background: #f0f4f8;
    color: #1a1a2e;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ====== Default Background: Soft Dark Gradient ====== */
  .bg-layer {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse at 50% 0%, #8d7d80 0%, #6c5b65 35%, #4e3d47 70%, #392b34 100%);
  }
  .bg-layer::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: transparent;
  }
  .bg-orb {
    position: absolute; border-radius: 50%;
    filter: blur(120px); opacity: 0.08;
    animation: orbFloat 20s ease-in-out infinite;
  }
  .bg-orb:nth-child(1) { width: 600px; height: 600px; background: #c4a5ac; top: -15%; left: -10%; animation-delay: 0s; opacity: 0.15; }
  .bg-orb:nth-child(2) { width: 500px; height: 500px; background: #a08a9a; top: 50%; right: -12%; animation-delay: -7s; opacity: 0.15; }
  .bg-orb:nth-child(3) { width: 450px; height: 450px; background: #8a6b7b; bottom: -10%; left: 30%; animation-delay: -14s; opacity: 0.15; }
  @keyframes orbFloat {
    0%,100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(3%, -2%) scale(1.05); }
    66% { transform: translate(-2%, 2%) scale(0.95); }
  }
  .bg-grid { display: none; }

  /* ====== Custom Wallpaper ====== */
  .bg-wallpaper {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1;
    background-size: cover; background-position: center; background-repeat: no-repeat;
    pointer-events: none; display: none;
  }
  .bg-wallpaper.active { display: block; }
  .bg-wallpaper.active ~ .bg-layer .bg-orb { opacity: 0.08; }
  .bg-wallpaper.active ~ .bg-layer .bg-grid { opacity: 0.5; }
  .wallpaper-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(240,244,248,0.35); z-index: 2;
    pointer-events: none; display: none;
  }
  .bg-wallpaper.active ~ .wallpaper-overlay { display: block; }

  /* Wallpaper picker popup */
  .wallpaper-popup {
    position: absolute; top: calc(100% + 8px); right: 0;
    background: rgba(255,255,255,0.95); border: 1px solid rgba(0,0,0,0.08);
    border-radius: 16px; padding: 8px; min-width: 200px;
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    z-index: 50; display: none;
    animation: fadeIn 0.15s ease;
  }
  .wallpaper-popup.show { display: block; }
  .wallpaper-item {
    padding: 10px 16px; border-radius: 10px; cursor: pointer;
    font-size: 13px; color: rgba(0,0,0,0.7); transition: all 0.15s;
    display: flex; align-items: center; gap: 10px; font-weight: 500;
  }
  .wallpaper-item:hover { background: rgba(0,0,0,0.04); color: #1a1a2e; }
  .wallpaper-item.danger:hover { background: rgba(244,63,94,0.15); color: #f43f5e; }
  .wallpaper-url-input {
    padding: 8px 12px; margin: 4px 6px 6px;
    border: 1px solid rgba(0,0,0,0.1); border-radius: 10px;
    background: rgba(0,0,0,0.02); color: #1a1a2e; font-size: 13px;
    outline: none; width: calc(100% - 12px); font-family: inherit;
    transition: border var(--transition);
    display: none;
  }
  .wallpaper-url-input.show { display: block; }
  .wallpaper-url-input:focus { border-color: rgba(102,126,234,0.4); }
  .toolbar-right-wrap { position: relative; display: flex; gap: 8px; align-items: center; }

  .container { width: 100%; max-width: 1280px; padding: 60px 28px 80px; margin: 0 auto; position: relative; z-index: 1; }

  /* ====== Header ====== */
  .header { text-align: center; margin-bottom: 40px; }
  .clock-row { display: flex; align-items: center; justify-content: center; gap: 16px; }
  .clock {
    font-size: 88px; font-weight: 200; letter-spacing: 4px; color: #fff; line-height: 1;
    text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    font-variant-numeric: tabular-nums;
  }
  .weather-widget {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 20px;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    font-size: 14px; color: rgba(255,255,255,0.8);
    backdrop-filter: blur(16px) saturate(150%); -webkit-backdrop-filter: blur(16px) saturate(150%);
    cursor: default; vertical-align: middle; margin-left: 8px;
  }
  .weather-widget .weather-icon { font-size: 20px; }
  .date-text { font-size: 15px; color: var(--text-secondary); margin-top: 12px; letter-spacing: 0.5px; text-shadow: 0 1px 8px rgba(0,0,0,0.2); }
  .greeting { font-size: 18px; font-weight: 400; margin-top: 4px; color: var(--text-muted); text-shadow: 0 1px 8px rgba(0,0,0,0.2); }

  /* ====== Search ====== */
  .search-section { margin-bottom: 20px; display: flex; justify-content: center; }
  .search-wrapper { position: relative; width: 100%; max-width: 680px; }
  .search-box {
    width: 100%; height: 60px; padding: 0 120px 0 24px;
    border: 1px solid rgba(255,255,255,0.25); border-radius: 20px;
    font-size: 17px; background: rgba(255,255,255,0.12); color: #fff;
    outline: none; transition: all var(--transition);
    backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
    box-shadow: 0 4px 30px rgba(0,0,0,0.08);
    letter-spacing: 0.3px;
  }
  .search-box::placeholder { color: rgba(255,255,255,0.5); }
  .search-box:focus {
    border-color: rgba(102,126,234,0.5);
    background: rgba(255,255,255,0.95);
    box-shadow: 0 0 0 4px rgba(102,126,234,0.1), 0 8px 30px rgba(0,0,0,0.08);
  }
  .search-engines {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    display: flex; gap: 4px;
  }
  .search-engine-dot {
    width: 34px; height: 34px; border-radius: 50%;
    background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.06);
    cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: all var(--transition); color: rgba(0,0,0,0.45);
  }
  .search-engine-dot:hover { background: rgba(0,0,0,0.08); color: #1a1a2e; border-color: rgba(0,0,0,0.15); }
  .search-engine-dot.active { background: rgba(102,126,234,0.15); color: #667eea; border-color: rgba(102,126,234,0.35); box-shadow: 0 0 12px rgba(102,126,234,0.1); }

  /* ====== Group Tabs ====== */
  .group-tabs { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; margin-bottom: 28px; }
  .group-tab {
    padding: 8px 20px; border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.7); font-size: 13px; cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap; display: flex; align-items: center; gap: 6px;
    backdrop-filter: blur(16px) saturate(150%); -webkit-backdrop-filter: blur(16px) saturate(150%);
    font-weight: 500;
  }
  .group-tab:hover { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.95); transform: translateY(-1px); }
  .group-tab.active { background: rgba(255,255,255,0.25); color: #fff; border-color: rgba(255,255,255,0.5); box-shadow: 0 2px 16px rgba(255,255,255,0.1); }
  .group-tab .tab-count { font-size: 11px; opacity: 0.6; background: rgba(255,255,255,0.12); padding: 1px 7px; border-radius: 10px; color: rgba(255,255,255,0.8); }
  .group-tab.active .tab-count { background: rgba(255,255,255,0.2); opacity: 0.9; }
  .group-tab .tab-actions { display: none; margin-left: 2px; gap: 2px; align-items: center; }
  .group-tab:hover .tab-actions { display: flex; }
  .tab-action {
    width: 20px; height: 20px; border-radius: 50%; border: none;
    background: rgba(0,0,0,0.08); color: inherit; cursor: pointer;
    font-size: 10px; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .tab-action:hover { background: rgba(0,0,0,0.15); transform: scale(1.1); }
  .add-group-btn {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px dashed rgba(0,0,0,0.12); background: rgba(255,255,255,0.5);
    color: rgba(0,0,0,0.3); cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
  }
  .add-group-btn:hover { border-color: rgba(102,126,234,0.4); color: #667eea; background: rgba(102,126,234,0.08); transform: scale(1.05); }

  /* ====== Toolbar ====== */
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .toolbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    padding: 9px 18px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.06);
    background: rgba(255,255,255,0.7); color: rgba(0,0,0,0.65); font-size: 13px;
    cursor: pointer; transition: all var(--transition);
    display: inline-flex; align-items: center; gap: 5px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    font-family: inherit; font-weight: 500; white-space: nowrap;
  }
  .btn:hover { background: rgba(255,255,255,0.95); border-color: rgba(0,0,0,0.14); color: #1a1a2e; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .btn-primary { background: rgba(102,126,234,0.12); color: #667eea; border-color: rgba(102,126,234,0.25); font-weight: 600; }
  .btn-primary:hover { background: rgba(102,126,234,0.2); border-color: rgba(102,126,234,0.4); box-shadow: 0 4px 20px rgba(102,126,234,0.15); color: #667eea; }
  .toolbar-right { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.7); cursor: pointer; font-size: 16px;
    width: 38px; height: 38px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
    backdrop-filter: blur(16px) saturate(150%); -webkit-backdrop-filter: blur(16px) saturate(150%);
  }
  .icon-btn:hover { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.4); color: #fff; transform: translateY(-1px); }
  .icon-btn.danger:hover { color: #ff6b6b; border-color: rgba(255,107,107,0.4); background: rgba(255,107,107,0.12); }

  /* ====== Bookmark Grid ====== */
  .bookmark-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 20px;
  }
  .bookmark-card.dragging { opacity: 0.4; transform: scale(0.95); }
  .bookmark-card.drag-over { border-color: rgba(255,255,255,0.8) !important; box-shadow: 0 0 20px rgba(255,255,255,0.3) !important; transform: scale(1.05); }
  .bookmark-card img { -webkit-user-drag: none; user-drag: none; pointer-events: none; }
  .bookmark-card {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 22px;
    padding: 28px 16px 22px;
    cursor: pointer; transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    text-align: center; position: relative;
    backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
    text-decoration: none; color: inherit;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    min-height: 175px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.06);
  }
  .bookmark-card:hover {
    background: rgba(255,255,255,0.28);
    border-color: rgba(255,255,255,0.5);
    transform: translateY(-6px) scale(1.025);
    box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    z-index: 2;
  }
  .card-icon {
    width: 68px; height: 68px; border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; flex-shrink: 0;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff; overflow: hidden; font-weight: 600;
    box-shadow: 0 6px 24px rgba(0,0,0,0.2);
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .bookmark-card:hover .card-icon { transform: scale(1.08); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
  .card-icon img { width: 40px; height: 40px; object-fit: contain; }
  .card-title { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.95); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; letter-spacing: 0.3px; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }
  .card-group-tag {
    font-size: 11px; padding: 4px 12px; border-radius: 12px;
    color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
    font-weight: 500;
  }
  .card-actions {
    position: absolute; top: 10px; right: 10px;
    display: flex; gap: 4px; opacity: 0; transition: opacity 0.22s;
  }
  .bookmark-card:hover .card-actions { opacity: 1; }
  .card-action {
    width: 30px; height: 30px; border-radius: 10px;
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.8); transition: all 0.2s;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .card-action:hover { transform: scale(1.1); }
  .card-action.del:hover { color: #f43f5e; border-color: rgba(244,63,94,0.25); background: rgba(244,63,94,0.08); }
  .card-action.edit:hover { color: #667eea; border-color: rgba(102,126,234,0.25); background: rgba(102,126,234,0.08); }

  /* ====== Login Screen ====== */
  .login-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #f0f4f8; z-index: 500;
    display: flex; align-items: center; justify-content: center;
  }
  .login-overlay::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(102,126,234,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(131,197,208,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(168,216,234,0.05) 0%, transparent 50%);
  }
  .login-card {
    background: rgba(255,255,255,0.8); border-radius: 28px;
    padding: 52px 44px; width: 90%; max-width: 400px;
    border: 1px solid rgba(0,0,0,0.06);
    backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
    text-align: center; position: relative; z-index: 1;
    box-shadow: 0 16px 48px rgba(0,0,0,0.08);
  }
  .login-icon {
    font-size: 44px; width: 84px; height: 84px; border-radius: 22px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 28px; color: #fff;
    box-shadow: 0 12px 32px rgba(102,126,234,0.25);
  }
  .login-card h2 { font-size: 24px; margin-bottom: 8px; color: #1a1a2e; font-weight: 600; }
  .login-card .subtitle { font-size: 14px; color: rgba(0,0,0,0.4); margin-bottom: 32px; }
  .login-card .error-msg { color: #f43f5e; font-size: 13px; margin-bottom: 14px; min-height: 20px; }
  .login-card input {
    width: 100%; height: 54px; padding: 0 20px;
    border: 1px solid rgba(0,0,0,0.08); border-radius: 16px;
    font-size: 16px; background: rgba(0,0,0,0.02); color: #1a1a2e;
    outline: none; transition: all var(--transition); font-family: inherit;
    text-align: center; letter-spacing: 5px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .login-card input::placeholder { color: rgba(0,0,0,0.25); }
  .login-card input:focus { border-color: rgba(102,126,234,0.45); background: rgba(255,255,255,0.9); box-shadow: 0 0 0 4px rgba(102,126,234,0.06); }
  .login-card .btn-login {
    width: 100%; height: 54px; border-radius: 16px;
    background: #667eea; color: #fff; border: 1px solid #667eea;
    font-size: 16px; cursor: pointer; margin-top: 24px;
    transition: all var(--transition); font-family: inherit; font-weight: 600;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .login-card .btn-login:hover { background: #5568d3; border-color: #5568d3; box-shadow: 0 4px 20px rgba(102,126,234,0.2); transform: translateY(-1px); }
  .login-card .btn-login:disabled { opacity: 0.45; cursor: not-allowed; }

  /* ====== Modal ====== */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.3); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; animation: fadeIn 0.2s ease;
  }
  .modal {
    background: rgba(255,255,255,0.95); border-radius: 24px;
    padding: 36px; width: 92%; max-width: 460px;
    border: 1px solid rgba(0,0,0,0.06);
    animation: slideUp 0.28s ease; backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 16px 48px rgba(0,0,0,0.12);
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(24px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .modal h3 { font-size: 20px; margin-bottom: 28px; font-weight: 600; color: #1a1a2e; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; color: rgba(0,0,0,0.5); letter-spacing: 0.3px; }
  .form-group input, .form-group select {
    width: 100%; height: 50px; padding: 0 16px;
    border: 1px solid rgba(0,0,0,0.08); border-radius: 14px;
    font-size: 15px; background: rgba(0,0,0,0.02); color: #1a1a2e;
    outline: none; transition: all var(--transition); font-family: inherit;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .form-group input::placeholder { color: rgba(0,0,0,0.25); }
  .form-group select option { background: #fff; color: #1a1a2e; }
  .form-group input:focus, .form-group select:focus { border-color: rgba(102,126,234,0.4); background: rgba(255,255,255,0.9); box-shadow: 0 0 0 3px rgba(102,126,234,0.06); }
  .url-row { display: flex; gap: 8px; }
  .url-row input { flex: 1; }
  .fetch-btn {
    height: 50px; padding: 0 18px; border-radius: 14px;
    border: 1px solid rgba(0,0,0,0.08); background: rgba(255,255,255,0.7);
    color: rgba(0,0,0,0.55); font-size: 13px; cursor: pointer;
    white-space: nowrap; transition: all var(--transition);
    font-family: inherit; flex-shrink: 0; font-weight: 500;
  }
  .fetch-btn:hover { background: rgba(102,126,234,0.1); color: #667eea; border-color: rgba(102,126,234,0.25); box-shadow: 0 2px 12px rgba(102,126,234,0.08); }
  .fetch-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .fetch-btn.fetching { animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 30px; }
  .color-picker-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .color-dot {
    width: 34px; height: 34px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent; transition: all var(--transition);
  }
  .color-dot:hover { transform: scale(1.18); }
  .color-dot.selected { border-color: #1a1a2e; box-shadow: 0 0 0 4px rgba(102,126,234,0.2); }

  /* ====== States ====== */
  .empty-state { text-align: center; padding: 80px 20px; color: rgba(0,0,0,0.3); }
  .empty-state .icon { font-size: 72px; margin-bottom: 24px; opacity: 0.35; }
  .empty-state h2 { font-size: 22px; margin-bottom: 10px; font-weight: 500; color: rgba(0,0,0,0.45); }
  .empty-state p { font-size: 14px; margin-bottom: 28px; }
  .footer { text-align: center; margin-top: 64px; color: rgba(0,0,0,0.2); font-size: 12px; letter-spacing: 0.5px; }
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.95); color: #1a1a2e; padding: 13px 30px;
    border-radius: 16px; font-size: 14px; z-index: 200;
    animation: toastIn 0.3s ease; border: 1px solid rgba(0,0,0,0.06);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    font-weight: 500; letter-spacing: 0.3px;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(16px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  .hidden { display: none !important; }

  /* ====== Context Menu ====== */
  .context-menu {
    position: fixed; z-index: 300;
    background: rgba(255,255,255,0.95); border: 1px solid rgba(0,0,0,0.08);
    border-radius: 16px; padding: 6px; min-width: 160px;
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    animation: fadeIn 0.15s ease;
  }
  .context-item {
    padding: 10px 16px; border-radius: 10px; cursor: pointer;
    font-size: 13px; color: rgba(0,0,0,0.7); transition: all 0.15s;
    display: flex; align-items: center; gap: 10px; font-weight: 500;
  }
  .context-item:hover { background: rgba(0,0,0,0.04); color: #1a1a2e; }
  .context-item.danger:hover { background: rgba(244,63,94,0.15); color: #f43f5e; }

  /* ====== Responsive ====== */
  @media (max-width: 768px) {
    .clock { font-size: 56px; }
    .search-box { height: 52px; font-size: 15px; }
    .bookmark-grid { grid-template-columns: repeat(auto-fill, minmax(125px, 1fr)); gap: 14px; }
    .bookmark-card { padding: 22px 12px 16px; min-height: 150px; border-radius: 18px; }
    .card-icon { width: 54px; height: 54px; font-size: 26px; border-radius: 16px; }
    .card-icon img { width: 32px; height: 32px; }
    .container { padding: 40px 16px 60px; }
    .login-card { padding: 40px 28px; }
  }
  @media (max-width: 480px) {
    .clock { font-size: 44px; }
    .bookmark-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
    .search-box { padding: 0 100px 0 16px; }
    .search-engine-dot { width: 28px; height: 28px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="bg-wallpaper" id="bgWallpaper"></div>
<div class="wallpaper-overlay"></div>
<div class="bg-layer">
  <div class="bg-grid"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>

<!-- Login Screen -->
<div class="login-overlay hidden" id="loginOverlay">
  <div class="login-card">
    <div class="login-icon">&#128274;</div>
    <h2>需要密码</h2>
    <p class="subtitle">请输入密码以访问你的书签收藏</p>
    <div class="error-msg" id="loginError"></div>
    <input type="password" id="loginPassword" placeholder="输入密码" autocomplete="off" maxlength="64">
    <button class="btn-login" id="loginBtn">解锁</button>
  </div>
</div>

<!-- Context Menu -->
<div class="context-menu hidden" id="contextMenu">
  <div class="context-item" data-action="open">&#128279; 在新标签页打开</div>
  <div class="context-item" data-action="edit">&#9998; 编辑书签</div>
  <div class="context-item danger" data-action="delete">&#10005; 删除书签</div>
</div>

<!-- Main Content -->
<div class="container" id="mainContent">
  <header class="header">
    <div class="clock-row">
      <div class="clock" id="clock">00:00</div>
    </div>
    <div class="date-text" id="dateText"></div>
    <div class="greeting" id="greeting"></div>
  </header>

  <div class="search-section">
    <div class="search-wrapper">
      <input class="search-box" id="searchInput" type="text" placeholder="搜索书签或输入关键词进行网页搜索..." autocomplete="off">
      <div class="search-engines">
        <button class="search-engine-dot active" data-engine="google" title="Google">G</button>
        <button class="search-engine-dot" data-engine="baidu" title="百度">百</button>
        <button class="search-engine-dot" data-engine="bing" title="Bing">B</button>
        <button class="search-engine-dot" data-engine="bookmark" title="搜索书签">&#128269;</button>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="toolbar-actions">
      <button class="btn btn-primary" id="addBookmarkBtn">+ 添加书签</button>
      <button class="btn" id="resetBtn">恢复默认</button>
      <button class="btn" id="exportBtn" title="导出 JSON 备份">导出</button>
      <button class="btn" id="importBtn" title="从 JSON 文件导入">导入</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
    </div>
    <div class="toolbar-right-wrap">
      <span style="font-size:12px;color:rgba(255,255,255,0.3);" id="bookmarkCount">加载中...</span>
      <button class="icon-btn" id="wallpaperBtn" title="更换壁纸">&#127912;</button>
      <button class="icon-btn danger" id="logoutBtn" title="锁定">&#128274;</button>
      <div class="wallpaper-popup" id="wallpaperPopup">
        <div class="wallpaper-item" id="wpUpload">&#128247; 选择本地图片</div>
        <div class="wallpaper-item" id="wpUrl">&#128279; 使用图片链接</div>
        <input type="text" class="wallpaper-url-input" id="wpUrlInput" placeholder="粘贴图片链接后按回车...">
        <div class="wallpaper-item danger hidden" id="wpClear">&#10005; 恢复默认背景</div>
      </div>
      <input type="file" id="wallpaperFileInput" accept="image/*" style="display:none;">
    </div>
  </div>

  <div class="group-tabs" id="groupTabs"></div>
  <div class="bookmark-grid" id="bookmarkGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="icon">&#128209;</div>
    <h2>还没有书签</h2>
    <p>点击上方「+ 添加书签」开始收藏你常用的网址</p>
  </div>
  <div class="footer">WorkBuddy 在线书签 — 数据云端存储，多设备同步</div>
</div>

<!-- Bookmark Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none;">
  <div class="modal">
    <h3 id="modalTitle">添加书签</h3>
    <div class="form-group">
      <label>网站名称</label>
      <input id="modalTitleInput" type="text" placeholder="例如：GitHub" maxlength="30">
    </div>
    <div class="form-group">
      <label>网址</label>
      <div class="url-row">
        <input id="modalUrlInput" type="text" placeholder="例如：https://github.com">
        <button class="fetch-btn" id="fetchMetaBtn" title="自动获取网站名称和图标">获取信息</button>
      </div>
    </div>
    <div class="form-group">
      <label>分组</label>
      <select id="modalGroupSelect">
        <option value="">无分组</option>
      </select>
    </div>
    <div class="form-group">
      <label>图标颜色 / 自定义图标</label>
      <div class="color-picker-row">
        <span class="color-dot selected" data-color="gradient1" style="background:linear-gradient(135deg,#667eea,#764ba2)"></span>
        <span class="color-dot" data-color="gradient2" style="background:linear-gradient(135deg,#f093fb,#f5576c)"></span>
        <span class="color-dot" data-color="gradient3" style="background:linear-gradient(135deg,#4facfe,#00f2fe)"></span>
        <span class="color-dot" data-color="gradient4" style="background:linear-gradient(135deg,#43e97b,#38f9d7)"></span>
        <span class="color-dot" data-color="gradient5" style="background:linear-gradient(135deg,#fa709a,#fee140)"></span>
        <span class="color-dot" data-color="gradient6" style="background:linear-gradient(135deg,#a18cd1,#fbc2eb)"></span>
        <span class="color-dot" data-color="gradient7" style="background:linear-gradient(135deg,#ffecd2,#fcb69f)"></span>
        <span class="color-dot" data-color="gradient8" style="background:linear-gradient(135deg,#667eea,#667eea)"></span>
      </div>
    </div>
    <div class="form-group">
      <input id="modalIconInput" type="text" placeholder="自定义图标 URL（可选）">
    </div>
    <div class="modal-actions">
      <button class="btn" id="modalCancel">取消</button>
      <button class="btn btn-primary" id="modalConfirm">确认</button>
    </div>
  </div>
</div>

<!-- Group Modal -->
<div class="modal-overlay" id="groupModalOverlay" style="display:none;">
  <div class="modal">
    <h3 id="groupModalTitle">添加分组</h3>
    <div class="form-group">
      <label>分组名称</label>
      <input id="groupNameInput" type="text" placeholder="例如：工作、学习、娱乐" maxlength="20">
    </div>
    <div class="form-group">
      <label>颜色</label>
      <div class="color-picker-row" id="groupColorPicker">
        <span class="color-dot selected" data-color="#7c6ff7" style="background:#7c6ff7"></span>
        <span class="color-dot" data-color="#f5576c" style="background:#f5576c"></span>
        <span class="color-dot" data-color="#f59e0b" style="background:#f59e0b"></span>
        <span class="color-dot" data-color="#10b981" style="background:#10b981"></span>
        <span class="color-dot" data-color="#3b82f6" style="background:#3b82f6"></span>
        <span class="color-dot" data-color="#8b5cf6" style="background:#8b5cf6"></span>
        <span class="color-dot" data-color="#ec4899" style="background:#ec4899"></span>
        <span class="color-dot" data-color="#14b8a6" style="background:#14b8a6"></span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" id="groupModalCancel">取消</button>
      <button class="btn btn-primary" id="groupModalConfirm">确认</button>
    </div>
  </div>
</div>

<script>
// === State ===
const DEFAULT_GROUPS = [
  { id: 'g1', name: '开发工具', color: '#7c6ff7' },
  { id: 'g2', name: '社交媒体', color: '#f5576c' },
  { id: 'g3', name: '学习资源', color: '#10b981' },
  { id: 'g4', name: '常用工具', color: '#3b82f6' },
];
const DEFAULT_BOOKMARKS = [
  { id: '1', title: 'GitHub', url: 'https://github.com', color: 'gradient8', groupId: 'g1' },
  { id: '2', title: '谷歌', url: 'https://www.google.com', color: 'gradient3', groupId: 'g4' },
  { id: '3', title: '百度', url: 'https://www.baidu.com', color: 'gradient4', groupId: 'g4' },
  { id: '4', title: 'B站', url: 'https://www.bilibili.com', color: 'gradient2', groupId: 'g2' },
  { id: '5', title: '知乎', url: 'https://www.zhihu.com', color: 'gradient3', groupId: 'g2' },
  { id: '6', title: '掘金', url: 'https://juejin.cn', color: 'gradient1', groupId: 'g1' },
  { id: '7', title: '微信公众平台', url: 'https://mp.weixin.qq.com', color: 'gradient6', groupId: 'g4' },
  { id: '8', title: 'YouTube', url: 'https://www.youtube.com', color: 'gradient2', groupId: 'g3' },
  { id: '9', title: 'Stack Overflow', url: 'https://stackoverflow.com', color: 'gradient5', groupId: 'g1' },
  { id: '10', title: '语雀', url: 'https://www.yuque.com', color: 'gradient6', groupId: 'g3' },
  { id: '11', title: '飞书', url: 'https://www.feishu.cn', color: 'gradient3', groupId: 'g4' },
  { id: '12', title: 'V2EX', url: 'https://www.v2ex.com', color: 'gradient8', groupId: 'g2' },
];

let bookmarks = [], groups = [];
let editingId = null, editingGroupId = null;
let currentEngine = 'google', filterQuery = '';
let selectedColor = 'gradient1', selectedGroup = null;
let useApi = false, authToken = null, needAuth = false;
let contextTargetId = null;

function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

// === Auth ===
function getAuthHeaders() {
  const headers = { 'Content-Type': 'application/json' };
  if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
  return headers;
}
async function apiCall(url, options = {}) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 5000);
  try {
    const res = await fetch(url, { headers: getAuthHeaders(), signal: controller.signal, ...options });
    clearTimeout(timeout);
    if (res.status === 401) { clearAuth(); showLogin(); throw new Error('登录已过期'); }
    const data = await res.json();
    if (!data.success && !res.ok) throw new Error(data.error || '请求失败');
    return data;
  } catch (e) { clearTimeout(timeout); if (e.name === 'AbortError') throw new Error('请求超时'); throw e; }
}
async function apiAuthFetch(url, options = {}) {
  const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...options });
  return res.json();
}

const API = '/api/bookmarks', API_GROUPS = '/api/groups', API_AUTH = '/api/auth';
const LS_KEY = 'wb_bookmarks', LS_KEY_GROUPS = 'wb_groups', LS_TOKEN = 'wb_token';

// === Login ===
function showLogin() { document.getElementById('loginOverlay').classList.remove('hidden'); document.getElementById('loginPassword').value = ''; document.getElementById('loginError').textContent = ''; document.getElementById('mainContent').classList.add('hidden'); setTimeout(() => document.getElementById('loginPassword').focus(), 150); }
function hideLogin() { document.getElementById('loginOverlay').classList.add('hidden'); document.getElementById('mainContent').classList.remove('hidden'); }

async function doLogin() {
  const password = document.getElementById('loginPassword').value.trim();
  if (!password) { document.getElementById('loginError').textContent = '请输入密码'; return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '验证中...';
  document.getElementById('loginError').textContent = '';
  try {
    const result = await apiAuthFetch(`${API_AUTH}/login`, { method: 'POST', body: JSON.stringify({ password }) });
    if (result.success) { authToken = result.token; localStorage.setItem(LS_TOKEN, authToken); hideLogin(); await loadBookmarks(); showToast('已解锁'); }
    else { document.getElementById('loginError').textContent = result.error || '密码错误'; }
  } catch (e) { document.getElementById('loginError').textContent = '网络错误，请重试'; }
  finally { btn.disabled = false; btn.textContent = '解锁'; }
}

function clearAuth() { authToken = null; localStorage.removeItem(LS_TOKEN); }
async function doLogout() {
  try { await apiAuthFetch(`${API_AUTH}/logout`, { method: 'POST', headers: getAuthHeaders() }); } catch (e) {}
  clearAuth(); showLogin(); showToast('已锁定');
}

// === Storage ===
async function checkApiAvailable() {
  try {
    const statusRes = await apiAuthFetch(`${API_AUTH}/status`);
    needAuth = statusRes.needAuth === true;
    if (needAuth) {
      const stored = localStorage.getItem(LS_TOKEN);
      if (stored) { authToken = stored; try { await apiCall(API); useApi = true; return; } catch (e) { clearAuth(); } }
      useApi = true; return;
    }
    try { const r = await fetch(API, { signal: AbortSignal.timeout(2000) }); const d = await r.json(); useApi = d.success === true; } catch { useApi = false; }
  } catch { useApi = false; needAuth = false; }
}

async function loadBookmarks() {
  if (useApi) { try { const result = await apiCall(API); bookmarks = result.data; groups = result.groups || []; } catch (e) { if (e.message.includes('登录已过期')) throw e; fallbackLocal(); } }
  else { fallbackLocal(); }
  renderAll();
}
function fallbackLocal() {
  useApi = false;
  const raw = localStorage.getItem(LS_KEY); bookmarks = raw ? (() => { try { return JSON.parse(raw); } catch { return []; } })() : [];
  if (bookmarks.length === 0) bookmarks = DEFAULT_BOOKMARKS.map(b => ({...b}));
  const rawG = localStorage.getItem(LS_KEY_GROUPS); groups = rawG ? (() => { try { return JSON.parse(rawG); } catch { return []; } })() : [];
  if (groups.length === 0) groups = [...DEFAULT_GROUPS];
  localSaveAll();
}
function localSaveAll() { localStorage.setItem(LS_KEY, JSON.stringify(bookmarks)); localStorage.setItem(LS_KEY_GROUPS, JSON.stringify(groups)); }

// === Group CRUD ===
async function saveAddGroup(name, color) {
  if (useApi) { const r = await apiCall(API_GROUPS, { method: 'POST', body: JSON.stringify({ name, color }) }); groups.push(r.data); return r; }
  const g = { id: generateId(), name, color }; groups.push(g); localSaveAll(); return { data: g };
}
async function saveUpdateGroup(id, name, color) {
  if (useApi) await apiCall(`${API_GROUPS}/${id}`, { method: 'PUT', body: JSON.stringify({ name, color }) });
  const idx = groups.findIndex(g => g.id === id);
  if (idx !== -1) { if (name !== undefined) groups[idx].name = name; if (color !== undefined) groups[idx].color = color; }
  localSaveAll();
}
async function saveDeleteGroup(id) {
  if (useApi) await apiCall(`${API_GROUPS}/${id}`, { method: 'DELETE' });
  groups = groups.filter(g => g.id !== id);
  bookmarks.forEach(bm => { if (bm.groupId === id) bm.groupId = ''; });
  if (selectedGroup === id) selectedGroup = null;
  localSaveAll();
}
function getGroupById(id) { return groups.find(g => g.id === id); }

// === Bookmark CRUD ===
async function saveAddBookmark(title, url, color, icon, groupId) {
  if (useApi) { const r = await apiCall(API, { method: 'POST', body: JSON.stringify({ title, url, color, icon, groupId }) }); bookmarks.push(r.data); return r; }
  const bm = { id: generateId(), title, url, color: color || 'gradient1', icon: icon || '', groupId: groupId || '' }; bookmarks.push(bm); localSaveAll(); return { data: bm };
}
async function saveUpdateBookmark(id, title, url, color, icon, groupId) {
  if (useApi) { const r = await apiCall(`${API}/${id}`, { method: 'PUT', body: JSON.stringify({ title, url, color, icon, groupId }) }); const idx = bookmarks.findIndex(b => b.id === id); if (idx !== -1) bookmarks[idx] = r.data; return r; }
  const idx = bookmarks.findIndex(b => b.id === id);
  if (idx !== -1) { bookmarks[idx] = { ...bookmarks[idx], title, url, color, icon, groupId }; localSaveAll(); }
  return { data: bookmarks[idx] };
}
async function saveDeleteBookmark(id) { if (useApi) await apiCall(`${API}/${id}`, { method: 'DELETE' }); bookmarks = bookmarks.filter(b => b.id !== id); localSaveAll(); }
async function resetBookmarks() {
  if (useApi) { const r = await apiCall(`${API}/reset`, { method: 'POST' }); bookmarks = r.data; groups = r.groups || []; }
  else { bookmarks = DEFAULT_BOOKMARKS.map(b => ({...b})); groups = [...DEFAULT_GROUPS]; selectedGroup = null; localSaveAll(); }
}

// === Render ===
function renderAll() { renderGroupTabs(); renderBookmarks(); }
function getIconHtml(bm) {
  if (bm.icon && bm.icon.startsWith('http')) return `<img src="${bm.icon}" alt="" draggable="false" onerror="this.style.display='none';this.parentElement.textContent='${bm.title.charAt(0).toUpperCase()}';" crossorigin="anonymous">`;
  return bm.title.charAt(0).toUpperCase();
}
function getColorStyle(color) {
  const gradients = {
    gradient1: 'linear-gradient(135deg, #667eea, #764ba2)', gradient2: 'linear-gradient(135deg, #f093fb, #f5576c)',
    gradient3: 'linear-gradient(135deg, #4facfe, #00f2fe)', gradient4: 'linear-gradient(135deg, #43e97b, #38f9d7)',
    gradient5: 'linear-gradient(135deg, #fa709a, #fee140)', gradient6: 'linear-gradient(135deg, #a18cd1, #fbc2eb)',
    gradient7: 'linear-gradient(135deg, #ffecd2, #fcb69f)', gradient8: 'linear-gradient(135deg, #667eea, #667eea)',
  };
  return gradients[color] || gradients.gradient8;
}

function renderGroupTabs() {
  const container = document.getElementById('groupTabs');
  const allCount = bookmarks.length;
  let html = `<button class="group-tab ${selectedGroup === null ? 'active' : ''}" data-group="">全部<span class="tab-count">${allCount}</span></button>`;
  groups.forEach(g => {
    const count = bookmarks.filter(b => b.groupId === g.id).length;
    const active = selectedGroup === g.id;
    html += `<button class="group-tab ${active ? 'active' : ''}" data-group="${g.id}">
      ${escapeHtml(g.name)}<span class="tab-count">${count}</span>
      <span class="tab-actions" onclick="event.stopPropagation()">
        <button class="tab-action" onclick="editGroupPrompt('${g.id}')" title="编辑">&#9998;</button>
        <button class="tab-action" onclick="deleteGroupPrompt('${g.id}')" title="删除">&#10005;</button>
      </span>
    </button>`;
  });
  html += `<button class="add-group-btn" id="addGroupBtn" title="添加分组">+</button>`;
  container.innerHTML = html;
  container.querySelectorAll('.group-tab').forEach(tab => {
    tab.addEventListener('click', () => { selectedGroup = tab.dataset.group || null; renderAll(); });
  });
  document.getElementById('addGroupBtn').addEventListener('click', () => openGroupModal('添加分组', null));
}

function renderBookmarks() {
  const grid = document.getElementById('bookmarkGrid');
  const empty = document.getElementById('emptyState');
  const countEl = document.getElementById('bookmarkCount');
  let filtered = selectedGroup ? bookmarks.filter(b => b.groupId === selectedGroup) : bookmarks;
  if (filterQuery) { const q = filterQuery.toLowerCase(); filtered = filtered.filter(b => b.title.toLowerCase().includes(q) || b.url.toLowerCase().includes(q)); }
  const total = bookmarks.length;
  countEl.textContent = `${filtered.length} / ${total} 个书签${useApi ? '' : ' (本地)'}`;

  if (filtered.length === 0) {
    grid.innerHTML = ''; empty.style.display = 'block';
    empty.querySelector('h2').textContent = selectedGroup ? '该分组暂无书签' : (filterQuery ? '未找到匹配的书签' : '还没有书签');
    empty.querySelector('p').textContent = selectedGroup ? '点击「+ 添加书签」并选择此分组' : (filterQuery ? '试试其他关键词' : '点击「+ 添加书签」开始收藏');
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = filtered.map(bm => {
    const group = getGroupById(bm.groupId);
    const groupTag = group ? `<span class="card-group-tag" style="background:${group.color}44;color:${group.color}">${escapeHtml(group.name)}</span>` : '';
    return `<div class="bookmark-card" data-id="${bm.id}" draggable="true" onclick="openBookmark(event,'${bm.id}')" oncontextmenu="showContextMenu(event,'${bm.id}')">
      <div class="card-icon" style="background:${getColorStyle(bm.color)};">${getIconHtml(bm)}</div>
      <span class="card-title">${escapeHtml(bm.title)}</span>${groupTag}
      <div class="card-actions">
        <button class="card-action edit" onclick="event.stopPropagation();editBookmark('${bm.id}')" title="编辑">&#9998;</button>
        <button class="card-action del" onclick="event.stopPropagation();deleteBookmark('${bm.id}')" title="删除">&#10005;</button>
      </div>
    </div>`;
  }).join('');
  bindDragEvents();
}

// === Drag & Drop Reorder ===
let dragSrcId = null;
let justDragged = false;
function bindDragEvents() {
  const cards = document.querySelectorAll('.bookmark-card');
  cards.forEach(card => {
    card.addEventListener('dragstart', e => {
      dragSrcId = card.dataset.id;
      justDragged = true;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', card.dataset.id);
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.bookmark-card').forEach(c => c.classList.remove('drag-over'));
      setTimeout(() => { justDragged = false; }, 100);
    });
    card.addEventListener('dragenter', e => {
      e.preventDefault();
      if (card.dataset.id !== dragSrcId) card.classList.add('drag-over');
    });
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (card.dataset.id !== dragSrcId) card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', e => {
      if (e.target === card) card.classList.remove('drag-over');
    });
    card.addEventListener('drop', e => {
      e.preventDefault();
      e.stopPropagation();
      card.classList.remove('drag-over');
      const targetId = card.dataset.id;
      if (!dragSrcId || dragSrcId === targetId) return;
      const srcIdx = bookmarks.findIndex(b => b.id === dragSrcId);
      const tgtIdx = bookmarks.findIndex(b => b.id === targetId);
      if (srcIdx === -1 || tgtIdx === -1) return;
      const [moved] = bookmarks.splice(srcIdx, 1);
      bookmarks.splice(tgtIdx, 0, moved);
      dragSrcId = null;
      saveReorder();
      renderBookmarks();
    });
  });
}
async function saveReorder() {
  if (useApi) {
    try { await apiCall(`${API}/reorder`, { method: 'PUT', body: JSON.stringify({ ids: bookmarks.map(b => b.id) }) }); } catch (e) { console.error('Reorder save failed:', e); }
  } else { localSaveAll(); }
}

function openBookmark(event, id) { if (justDragged) { event.preventDefault(); return; } if (event.target.closest('.card-action')) return; const bm = bookmarks.find(b => b.id === id); if (bm) { let url = bm.url; if (!/^https?:\/\//i.test(url)) url = 'https://' + url; window.open(url, '_blank'); } }

function showContextMenu(event, id) { event.preventDefault(); contextTargetId = id; const menu = document.getElementById('contextMenu'); menu.style.left = event.clientX + 'px'; menu.style.top = event.clientY + 'px'; menu.classList.remove('hidden'); }
function hideContextMenu() { document.getElementById('contextMenu').classList.add('hidden'); contextTargetId = null; }

function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
function showToast(msg) {
  const existing = document.querySelector('.toast'); if (existing) existing.remove();
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
}

// === Group Modal ===
function openGroupModal(title, g) {
  editingGroupId = g ? g.id : null;
  document.getElementById('groupModalTitle').textContent = title;
  document.getElementById('groupNameInput').value = g ? g.name : '';
  const activeColor = g ? g.color : '#7c6ff7';
  document.querySelectorAll('#groupColorPicker .color-dot').forEach(dot => dot.classList.toggle('selected', dot.dataset.color === activeColor));
  document.getElementById('groupModalOverlay').style.display = 'flex';
  document.getElementById('groupNameInput').focus();
}
function closeGroupModal() { document.getElementById('groupModalOverlay').style.display = 'none'; editingGroupId = null; }
async function confirmGroup() {
  const name = document.getElementById('groupNameInput').value.trim(); if (!name) { showToast('请输入分组名称'); return; }
  const color = document.querySelector('#groupColorPicker .color-dot.selected').dataset.color;
  try { if (editingGroupId) { await saveUpdateGroup(editingGroupId, name, color); showToast('分组已更新'); } else { await saveAddGroup(name, color); showToast('分组已添加'); } closeGroupModal(); renderAll(); } catch (e) { showToast('操作失败: ' + e.message); }
}
function editGroupPrompt(id) { const g = getGroupById(id); if (g) openGroupModal('编辑分组', g); }
async function deleteGroupPrompt(id) { const g = getGroupById(id); if (!g) return; if (!confirm(`确定删除分组「${g.name}」吗？\n书签不会被删除，只会移出分组。`)) return; try { await saveDeleteGroup(id); renderAll(); showToast('分组已删除'); } catch (e) { showToast('删除失败: ' + e.message); } }

// === Bookmark Modal ===
function openModal(title, bm) {
  editingId = bm ? bm.id : null;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalTitleInput').value = bm ? bm.title : '';
  document.getElementById('modalUrlInput').value = bm ? bm.url : '';
  document.getElementById('modalIconInput').value = bm ? (bm.icon || '') : '';
  selectedColor = bm ? (bm.color || 'gradient1') : 'gradient1'; updateColorPicker();
  const select = document.getElementById('modalGroupSelect');
  select.innerHTML = '<option value="">无分组</option>' + groups.map(g => `<option value="${g.id}" ${bm && bm.groupId === g.id ? 'selected' : ''}>${escapeHtml(g.name)}</option>`).join('');
  document.getElementById('modalOverlay').style.display = 'flex';
  document.getElementById('modalTitleInput').focus();
}
function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; editingId = null; }
function updateColorPicker() { document.querySelectorAll('#modalOverlay .color-dot').forEach(dot => dot.classList.toggle('selected', dot.dataset.color === selectedColor)); }

async function addBookmark() {
  const title = document.getElementById('modalTitleInput').value.trim();
  let url = document.getElementById('modalUrlInput').value.trim();
  const icon = document.getElementById('modalIconInput').value.trim();
  const groupId = document.getElementById('modalGroupSelect').value;
  if (!title || !url) { showToast('请填写名称和网址'); return; }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  try {
    if (editingId) { await saveUpdateBookmark(editingId, title, url, selectedColor, icon, groupId); showToast('书签已更新'); }
    else { await saveAddBookmark(title, url, selectedColor, icon, groupId); showToast('书签已添加'); }
    renderAll(); closeModal();
  } catch (e) { showToast('操作失败: ' + e.message); }
}

// === Auto-fetch ===
async function fetchWebsiteMeta() {
  const url = document.getElementById('modalUrlInput').value.trim(); if (!url) return;
  const btn = document.getElementById('fetchMetaBtn'); btn.textContent = '获取中...'; btn.disabled = true; btn.classList.add('fetching');
  try {
    if (useApi) {
      const r = await apiCall(`/api/fetch-meta?url=${encodeURIComponent(url)}`);
      if (r.success) { const ti = document.getElementById('modalTitleInput'); if (!ti.value.trim() && r.title) ti.value = r.title; if (r.icon) { const ii = document.getElementById('modalIconInput'); if (!ii.value.trim()) ii.value = r.icon; } showToast(r.title ? `已获取: ${r.title}` : '未找到标题'); }
    }
  } catch (e) { showToast('获取失败: ' + e.message); }
  finally { btn.textContent = '获取信息'; btn.disabled = false; btn.classList.remove('fetching'); }
}

function editBookmark(id) { const bm = bookmarks.find(b => b.id === id); if (bm) openModal('编辑书签', bm); }
async function deleteBookmark(id) { if (!confirm('确定要删除这个书签吗？')) return; try { await saveDeleteBookmark(id); renderAll(); showToast('书签已删除'); } catch (e) { showToast('删除失败: ' + e.message); } }

// === Search ===
function doSearch(query) {
  if (currentEngine === 'bookmark') { filterQuery = query; renderBookmarks(); return; }
  const engines = { google: 'https://www.google.com/search?q=', baidu: 'https://www.baidu.com/s?wd=', bing: 'https://www.bing.com/search?q=' };
  window.open(engines[currentEngine] + encodeURIComponent(query), '_blank');
}

// === Clock ===
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
  const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  document.getElementById('dateText').textContent = `${now.getFullYear()} / ${now.getMonth() + 1} / ${now.getDate()}  ${weekdays[now.getDay()]}`;
  const h = now.getHours(), g = h < 6 ? '夜深了，早点休息' : h < 9 ? '早上好，新的一天开始了' : h < 12 ? '上午好，精力充沛' : h < 14 ? '中午好，记得吃午饭' : h < 18 ? '下午好，继续加油' : h < 22 ? '晚上好，放松一下吧' : '夜深了，早点休息';
  document.getElementById('greeting').textContent = g;
}

// === Export / Import ===
function exportBookmarks() {
  try { const blob = new Blob([JSON.stringify({ bookmarks, groups }, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `bookmarks-backup-${new Date().toISOString().slice(0,10)}.json`; a.click(); showToast('导出成功'); } catch (e) { showToast('导出失败'); }
}
async function importBookmarks(file) {
  try {
    const text = await file.text(); let data = JSON.parse(text);
    if (Array.isArray(data)) data = { bookmarks: data, groups: [] };
    const ig = data.groups || [], ib = data.bookmarks || [];
    if (useApi) { for (const g of ig) await apiCall(API_GROUPS, { method: 'POST', body: JSON.stringify({ name: g.name, color: g.color || '#7c6ff7' }) }); for (const bm of ib) await apiCall(API, { method: 'POST', body: JSON.stringify({ title: bm.title, url: bm.url, color: bm.color || 'gradient1', icon: bm.icon || '', groupId: bm.groupId || '' }) }); await loadBookmarks(); }
    else { for (const g of ig) { if (!groups.some(ex => ex.id === g.id)) groups.push(g); } for (const bm of ib) { bookmarks.push({ ...bm, id: generateId() }); } localSaveAll(); renderAll(); }
    showToast(`成功导入 ${ib.length} 个书签、${ig.length} 个分组`);
  } catch (e) { showToast('导入失败: ' + e.message); }
}

// === Wallpaper ===
const WP_KEY = 'wb_wallpaper';
function setWallpaper(dataUrl) {
  localStorage.setItem(WP_KEY, dataUrl);
  const el = document.getElementById('bgWallpaper');
  el.style.backgroundImage = `url(${dataUrl})`;
  el.classList.add('active');
  document.getElementById('wpClear').classList.remove('hidden');
}
function clearWallpaper() {
  localStorage.removeItem(WP_KEY);
  document.getElementById('bgWallpaper').classList.remove('active');
  document.getElementById('bgWallpaper').style.backgroundImage = '';
  document.getElementById('wpClear').classList.add('hidden');
  showToast('已恢复默认背景');
}
function loadWallpaper() {
  const dataUrl = localStorage.getItem(WP_KEY);
  if (dataUrl) {
    document.getElementById('bgWallpaper').style.backgroundImage = `url(${dataUrl})`;
    document.getElementById('bgWallpaper').classList.add('active');
    document.getElementById('wpClear').classList.remove('hidden');
  }
}
function toggleWallpaperPopup() {
  document.getElementById('wallpaperPopup').classList.toggle('show');
}

// === Events ===
document.getElementById('addBookmarkBtn').addEventListener('click', () => openModal('添加书签', null));
document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modalConfirm').addEventListener('click', addBookmark);
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('fetchMetaBtn').addEventListener('click', fetchWebsiteMeta);
document.getElementById('modalUrlInput').addEventListener('blur', () => { const ti = document.getElementById('modalTitleInput'); const ui = document.getElementById('modalUrlInput'); if (!ti.value.trim() && ui.value.trim()) fetchWebsiteMeta(); });
document.getElementById('groupModalCancel').addEventListener('click', closeGroupModal);
document.getElementById('groupModalConfirm').addEventListener('click', confirmGroup);
document.getElementById('groupModalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeGroupModal(); });
document.getElementById('exportBtn').addEventListener('click', exportBookmarks);
document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', e => { if (e.target.files[0]) importBookmarks(e.target.files[0]); e.target.value = ''; });
document.getElementById('logoutBtn').addEventListener('click', doLogout);
document.querySelectorAll('#modalOverlay .color-dot').forEach(dot => dot.addEventListener('click', () => { selectedColor = dot.dataset.color; updateColorPicker(); }));
document.querySelectorAll('#groupColorPicker .color-dot').forEach(dot => dot.addEventListener('click', () => { document.querySelectorAll('#groupColorPicker .color-dot').forEach(d => d.classList.remove('selected')); dot.classList.add('selected'); }));

// Context menu
document.querySelectorAll('#contextMenu .context-item').forEach(item => item.addEventListener('click', () => {
  const action = item.dataset.action; hideContextMenu();
  if (!contextTargetId) return;
  if (action === 'open') { const bm = bookmarks.find(b => b.id === contextTargetId); if (bm) { let url = bm.url; if (!/^https?:\/\//i.test(url)) url = 'https://' + url; window.open(url, '_blank'); } }
  if (action === 'edit') editBookmark(contextTargetId);
  if (action === 'delete') deleteBookmark(contextTargetId);
}));
document.addEventListener('click', e => { if (!e.target.closest('#contextMenu')) hideContextMenu(); });

// Search engines
document.querySelectorAll('.search-engine-dot').forEach(dot => dot.addEventListener('click', () => {
  document.querySelectorAll('.search-engine-dot').forEach(d => d.classList.remove('active'));
  dot.classList.add('active'); currentEngine = dot.dataset.engine;
  document.getElementById('searchInput').placeholder = currentEngine === 'bookmark' ? '搜索你的书签...' : '输入关键词搜索网页...';
  if (currentEngine !== 'bookmark') { filterQuery = ''; renderBookmarks(); }
}));

// Search input
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { const q = e.target.value.trim(); if (q) doSearch(q); }
  if (currentEngine === 'bookmark') { filterQuery = e.target.value.trim(); renderBookmarks(); }
});
document.getElementById('searchInput').addEventListener('input', () => {
  if (currentEngine === 'bookmark') { filterQuery = document.getElementById('searchInput').value.trim(); renderBookmarks(); }
});
document.getElementById('resetBtn').addEventListener('click', async () => { if (!confirm('确定恢复默认数据吗？所有修改将被替换。')) return; try { await resetBookmarks(); selectedGroup = null; filterQuery = ''; renderAll(); showToast('已恢复默认数据'); } catch (e) { showToast('重置失败: ' + e.message); } });
document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Wallpaper events
document.getElementById('wallpaperBtn').addEventListener('click', e => { e.stopPropagation(); toggleWallpaperPopup(); });
document.getElementById('wpUpload').addEventListener('click', () => { document.getElementById('wallpaperFileInput').click(); toggleWallpaperPopup(); });
document.getElementById('wallpaperFileInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => { setWallpaper(reader.result); showToast('壁纸已更新'); };
  reader.onerror = () => showToast('图片读取失败');
  reader.readAsDataURL(file);
  e.target.value = '';
});
document.getElementById('wpUrl').addEventListener('click', () => {
  document.getElementById('wpUrlInput').classList.toggle('show');
  if (document.getElementById('wpUrlInput').classList.contains('show')) setTimeout(() => document.getElementById('wpUrlInput').focus(), 100);
});
document.getElementById('wpUrlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const url = e.target.value.trim(); if (!url) return;
    const img = new Image(); img.crossOrigin = 'anonymous';
    img.onload = () => {
      const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
      const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
      setWallpaper(canvas.toDataURL('image/jpeg', 0.85));
      showToast('壁纸已更新');
      toggleWallpaperPopup(); document.getElementById('wpUrlInput').value = ''; document.getElementById('wpUrlInput').classList.remove('show');
    };
    img.onerror = () => { showToast('图片链接无效，请检查后重试'); };
    img.src = url;
  }
});
document.getElementById('wpClear').addEventListener('click', () => { clearWallpaper(); toggleWallpaperPopup(); });
document.addEventListener('click', e => {
  if (!e.target.closest('#wallpaperPopup') && !e.target.closest('#wallpaperBtn')) {
    document.getElementById('wallpaperPopup').classList.remove('show');
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { hideContextMenu(); if (document.getElementById('groupModalOverlay').style.display === 'flex') closeGroupModal(); else closeModal(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
});

// === Init ===
(async function init() {
  updateClock(); setInterval(updateClock, 10000);
  loadWallpaper();
  await checkApiAvailable();
  if (needAuth) {
    if (authToken) { try { await loadBookmarks(); hideLogin(); return; } catch (e) { showLogin(); return; } }
    showLogin(); return;
  }
  document.getElementById('logoutBtn').style.display = 'none';
  await loadBookmarks();
})();
</script>
</body>
</html>
